cd ~/sigstore-slsa-devsecops

cat > .github/workflows/pipeline-g3-completo.yml << 'WORKFLOW'
name: "G3 - DevSecOps Pipeline (Firma + SBOM + SLSA L2)"

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: miglovi/sigstore-slsa-devsecops

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:

  build-and-push:
    name: "Job 1 - Build & Push Docker"
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=latest
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  sign-image:
    name: "Job 2 - Firma Keyless Cosign"
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Instalar Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'
      - name: Firmar Imagen
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          cosign sign --yes "${IMAGE}"
          echo "Firma registrada en Rekor"

  sbom-and-sign:
    name: "Job 3 - SBOM Trivy + Firma"
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Instalar Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'
      - name: Instalar Trivy
        run: |
          sudo apt-get install wget apt-transport-https gnupg jq -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
          | gpg --dearmor \
          | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
          | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install trivy -y
      - name: Pull y generar SBOM
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          docker pull "${IMAGE}"
          trivy image --format spdx-json --output sbom.spdx.json "${IMAGE}"
          echo "SBOM generado"
      - name: Adjuntar SBOM firmado
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          cosign attest --yes --type spdxjson --predicate sbom.spdx.json "${IMAGE}"
          echo "SBOM adjuntado y firmado"
      - name: Guardar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx-json
          path: sbom.spdx.json

  slsa-provenance:
    name: "Job 4 - Provenance SLSA Level 2"
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Instalar Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'
      - name: Generar Provenance
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          cat > provenance.json << EOF
          {
            "buildType": "https://github.com/Attestations/GitHubActionsWorkflow@v1",
            "builder": {
              "id": "https://github.com/${{ github.repository }}"
            },
            "invocation": {
              "configSource": {
                "uri": "https://github.com/${{ github.repository }}",
                "digest": {
                  "sha1": "${{ github.sha }}"
                },
                "entryPoint": ".github/workflows/pipeline-g3-completo.yml"
              }
            }
          }
          EOF
          cosign attest \
            --yes \
            --predicate provenance.json \
            --type custom \
            "${IMAGE}"
          echo "Provenance generado correctamente"

  verify:
    name: "Job 5 - Verificacion Final"
    runs-on: ubuntu-latest
    needs:
      - sign-image
      - sbom-and-sign
      - slsa-provenance
    steps:
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Instalar Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'
      - name: Instalar jq
        run: sudo apt-get install jq -y
      - name: Verificar Firma
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${IMAGE}" \
            | jq '.[0] | {Issuer: .optional.Issuer, Subject: .optional.Subject}'
          echo "Pipeline DevSecOps completado - SLSA Level 2"
