name: Build Sign and Push

on:
  push:
    branches: [main]

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build imagen
        run: docker build -t miclovi/sigstore-slsa:${{ github.sha }} .

      - name: Push imagen
        run: docker push miclovi/sigstore-slsa:${{ github.sha }}

      - name: Instalar Cosign
        uses: sigstore/cosign-installer@v3

      - name: Firmar imagen
        run: cosign sign --yes miclovi/sigstore-slsa:${{ github.sha }}
